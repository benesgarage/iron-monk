site_name: iron-monk
site_description: A minimalist, strict validation library for Python dataclasses.
site_url: https://benesgarage.github.io/iron-monk/

theme:
  name: material
  logo: assets/monk.png
  favicon: assets/monk.png
  features:
    - navigation.sections
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

repo_name: benesgarage/iron-monk
repo_url: https://github.com/benesgarage/iron-monk

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Home: index.md
  - Core Concepts: core_concepts.md
  - The Constraint Toolkit: constraints.md
  - Advanced Usage: advanced.md
  - Real-World Examples:
      - Overview: examples.md
      - Web & API:
        - Strawberry GraphQL: examples/strawberry.md
        - Starlette (ASGI): examples/starlette.md
      - Config & CLI:
        - App Configuration: examples/app_config.md
        - tyro (CLI tool): examples/tyro.md
      - Typing & Ecosystem:
        - Beartype: examples/beartype.md
      - Data & ORMs:
        - SQLAlchemy 2.0: examples/sqlalchemy.md
        - Tortoise ORM: examples/tortoise_orm.md